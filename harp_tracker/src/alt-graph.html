<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            padding: 5px;
        }
        #chartContainer {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="chartContainer">
        <canvas id="altChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('altChart').getContext('2d');
        
        // Unit system state
        let currentUnits = 'metric';
        const ALTITUDE_CONVERSION = {
            metric: { factor: 1, name: 'm' },
            imperial: { factor: 3.28084, name: 'ft' }
        };
        
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Time values
                datasets: [{
                    label: 'Altitude (m)',
                    data: [], // Altitude values (stored in metric)
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        bottom: 0
                    }
                },
                scales: {
                    x: { title: { display: true, text: 'Time (s)' } },
                    y: { title: { display: false, text: 'Altitude (m)' }, beginAtZero: true }
                },
                plugins: {
                    tooltip: { enabled: true, mode: 'index', intersect: false }
                }
            }
        });
        
        // Function to update the chart label for units
        function updateChartLabel() {
            const unit = ALTITUDE_CONVERSION[currentUnits];
            chart.data.datasets[0].label = `Altitude (${unit.name})`;
            
            // Convert all existing data points to display units
            const metricData = chart.data.datasets[0].data.map(val => {
                if (typeof val === 'number') {
                    return val * unit.factor;
                }
                return val;
            });
            
            chart.data.datasets[0].data = metricData;
            chart.update();
        }
        
        // Function to add data
        function addDataPoint(time, alt) {
            const exists = chart.data.labels.includes(time);
            if (!exists) {
                // Store always in metric internally
                const metricAlt = typeof alt === 'number' ? alt : parseFloat(alt);
                chart.data.labels.push(time);
                
                // Display in current unit
                const unit = ALTITUDE_CONVERSION[currentUnits];
                const displayAlt = metricAlt * unit.factor;
                
                chart.data.datasets[0].data.push(displayAlt);
                chart.update();
            } else {
                console.warn(`Point at time ${time} already exists. Skipping.`);
            }
        }
        
        //listen for message
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'ADD_DATA') {
                addDataPoint(event.data.time, event.data.alt);
            } else if (event.data && event.data.type === 'SET_UNITS') {
                const newUnits = event.data.units;
                if (newUnits !== currentUnits) {
                    currentUnits = newUnits;
                    updateChartLabel();
                }
            }
        });
    </script>
</body>
</html>
